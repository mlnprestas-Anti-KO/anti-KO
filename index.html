function App(){
  const [screen,setScreen]=useState("landing");
  const [step,setStep]=useState(0);
  const [ans,setAns]=useState({});
  const [txt,setTxt]=useState("");
  const [result,setResult]=useState(null);
  const [err,setErr]=useState("");
  const [loadIdx,setLoadIdx]=useState(0);
  const [copied,setCopied]=useState(false);
  const [scoreAnim,setScoreAnim]=useState(0);
  const [unlocked,setUnlocked]=useState(false);
  const [codeIn,setCodeIn]=useState("");
  const [codeErr,setCodeErr]=useState("");
  const [apiIn,setApiIn]=useState("");
  const [showApi,setShowApi]=useState(false);
  const [saved,setSaved]=useState(null);
  const txtRef=useRef(null);

  useEffect(()=>{const s=load();if(s)setSaved(s);},[]);
  useEffect(()=>{if(screen==="quiz")setTimeout(()=>txtRef.current?.focus(),120);},[screen,step]);

  const cur=STEPS[step];
  const isLast=step===STEPS.length-1;
  const pct=Math.round((step+1)/STEPS.length*100);
  const curVal=cur.type==="text"?txt:(ans[cur.id]||"");
  const canNext=curVal.trim().length>=(cur.minLen||1);

  const next=async()=>{
    if(!canNext)return;
    const nd={...ans,[cur.id]:curVal};
    setAns(nd);
    if(isLast)await gen(nd);
    else{setStep(s=>s+1);setTxt("");}
  };

  const back=()=>{
    if(step===0){setScreen("landing");return;}
    const p=STEPS[step-1];setStep(s=>s-1);
    setTxt(p.type==="text"?(ans[p.id]||""):"");
  };

  const gen=async(data)=>{
    setScreen("loading");setErr("");setLoadIdx(0);
    const iv=setInterval(()=>setLoadIdx(i=>Math.min(i+1,LOAD_MSGS.length-1)),2000);
    try{
      // ✅ Appel sécurisé via proxy Vercel — la clé API reste côté serveur
      const r=await fetch("/api/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:buildPrompt(data)}]}),
      });
      if(!r.ok){setErr(`Erreur API (${r.status}).`);setScreen("quiz");return;}
      const raw=await r.json();
      if(raw.error){setErr(`Erreur: ${raw.error.message}`);setScreen("quiz");return;}
      const t=(raw.content?.[0]?.text||"").replace(/```json|```/g,"").trim();
      if(!t){setErr("Réponse vide.");setScreen("quiz");return;}

            <Lbl>Structure de l'offre</Lbl>
            <p style={{fontSize:"14px",color:"#2A1A0A",lineHeight:"1.75",margin:"0 0 18px",fontWeight:"300"}}>{result.offre?.description}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:"6px",marginBottom:"18px"}}>
              {(result.offre?.inclus||[]).map((it,i)=>(
                <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",background:"var(--cream)",padding:"10px 13px"}}>
                  <span style={{color:"var(--rouge)",fontWeight:"700",flexShrink:0}}>✓</span>
                  <span style={{fontSize:"12px",color:"#4A3828",lineHeight:"1.5",fontWeight:"300"}}>{it}</span>
                </div>
              ))}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"32px",borderTop:"1px solid var(--light)",paddingTop:"16px"}}>
              <div><div style={{fontFamily:"var(--font-mono)",fontSize:"7px",letterSpacing:"2.5px",color:"#C8B8A8",marginBottom:"3px"}}>DURÉE</div><div style={{fontSize:"13px"}}>{result.offre?.duree}</div></div>
              <div><div style={{fontFamily:"var(--font-mono)",fontSize:"7px",letterSpacing:"2.5px",color:"#C8B8A8",marginBottom:"3px"}}>LIVRABLE</div><div style={{fontSize:"13px"}}>{result.offre?.livrable}</div></div>
            </div>
          </Card>
          {/* Pricing + Alerte */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:"10px",marginBottom:"10px"}}>
            <Card style={{margin:0}}>
              <Lbl>Pricing recommandé</Lbl>
              <div style={{fontFamily:"var(--font-serif)",fontSize:"46px",fontWeight:"300",color:"var(--rouge)",letterSpacing:"-2px",lineHeight:1,marginBottom:"5px"}}>{result.pricing?.prix}</div>
              <div style={{fontFamily:"var(--font-mono)",fontSize:"9px",color:"#C8B8A8",marginBottom:"10px",letterSpacing:"1px"}}>Fourchette · {result.pricing?.fourchette}</div>
              <div style={{display:"inline-block",background:"var(--cream)",padding:"3px 12px",fontFamily:"var(--font-mono)",fontSize:"8px",color:"var(--mid)",marginBottom:"12px"}}>{result.pricing?.niveau}</div>
              <p style={{fontSize:"12px",color:"#4A3828",lineHeight:"1.6",fontWeight:"300"}}>{result.pricing?.logique}</p>
            </Card>
            <div style={{background:"#FFF8F0",borderLeft:"4px solid var(--terra)",padding:"24px 22px"}}>
              <Lbl color="var(--terra)" style={{marginBottom:"12px"}}>⚠ Erreur à éviter</Lbl>
              <p style={{fontSize:"13px",color:"#3A2010",lineHeight:"1.7",fontWeight:"300"}}>{result.alerte}</p>
            </div>
          </div>
          {/* Plan */}
          <Card>
            <Lbl>Plan d'action 10 jours</Lbl>
            {(result.plan||[]).map((it,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"72px 1fr",gap:"14px",borderBottom:i<result.plan.length-1?"1px solid var(--cream)":"none",padding:"13px 0",alignItems:"start"}}>
                <div style={{fontFamily:"var(--font-mono)",fontSize:"9px",color:"var(--rouge)",fontWeight:"500",letterSpacing:"0.5px",paddingTop:"2px"}}>{it.j}</div>
                <div>
                  <div style={{fontSize:"13px",lineHeight:"1.55",marginBottom:"4px"}}>{it.action}</div>
                  <div style={{fontSize:"12px",color:"var(--mid)",fontStyle:"italic",fontWeight:"300"}}>→ {it.resultat}</div>
                </div>
              </div>
            ))}
          </Card>
          {/* Script */}
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
              <Lbl style={{marginBottom:0}}>Script de prospection</Lbl>
              <button onClick={copyScript} style={{background:copied?"var(--green)":"var(--cream)",border:"none",color:copied?"#fff":"var(--mid)",padding:"7px 16px",cursor:"pointer",fontFamily:"var(--font-mono)",fontSize:"9px",letterSpacing:"2px",transition:"all 0.2s ease"}}>
                {copied?"✓ Copié !":"Copier"}
              </button>
            </div>
            <div style={{background:"var(--cream)",padding:"11px 16px",fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--mid)",marginBottom:"12px",letterSpacing:"0.5px"}}>✉ Objet : {result.script?.objet}</div>
            <div style={{fontSize:"14px",color:"#2A1A0A",lineHeight:"1.85",background:"var(--warm)",padding:"18px 20px",whiteSpace:"pre-wrap",borderLeft:"2px solid var(--light)",fontWeight:"300"}}>{result.script?.corps}</div>
          </Card>
          {/* Action CTA */}
          <div style={{background:"var(--rouge)",color:"#fff",padding:"24px 30px",display:"flex",alignItems:"flex-start",gap:"18px",marginBottom:"10px"}}>
            <div style={{fontSize:"24px",flexShrink:0,marginTop:"2px"}}>→</div>
            <div>
              <Lbl color="rgba(255,255,255,0.3)" style={{letterSpacing:"3.5px",marginBottom:"8px"}}>Prochaine action — Dans les 2h</Lbl>
              <p style={{fontSize:"15px",margin:0,lineHeight:"1.65",fontWeight:"300"}}>{result.action_aujourd_hui}</p>
            </div>
          </div>
        </>}

        {/* Upsell */}
        <div style={{border:"1px solid var(--light)",padding:"32px 28px",textAlign:"center",marginBottom:"36px",position:"relative",overflow:"hidden",background:"var(--white)"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:"linear-gradient(to right, var(--rouge), var(--terra), var(--gold))"}}/>
          <Lbl style={{textAlign:"center",marginBottom:"14px"}}>Envie d'aller plus vite ?</Lbl>
          <p style={{fontFamily:"var(--font-serif)",fontSize:"20px",fontWeight:"300",color:"var(--dark)",lineHeight:"1.65",margin:"0 auto 8px",maxWidth:"480px",letterSpacing:"-0.2px"}}>
            Ce plan est un point de départ. {CFG.prenom} t'accompagne pour le transformer en résultats concrets — dès cette semaine.
          </p>
          <p style={{fontSize:"12px",color:"var(--mid)",margin:"0 0 24px",fontStyle:"italic",fontWeight:"300"}}>Séance intensive · {CFG.prixAccomp} · Résultats mesurables en 10 jours</p>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
            <a href={CFG.calLink} target="_blank" rel="noopener noreferrer" style={{textDecoration:"none"}}>
              <Btn style={{padding:"15px 32px"}}>Réserver mon appel ({CFG.prixAppel}) →</Btn>
            </a>
            <a href={`mailto:${CFG.email}?subject=Accompagnement Anti K.O™`} style={{textDecoration:"none"}}>
              <Btn variant="secondary" style={{padding:"14px 24px"}}>Écrire à {CFG.prenom}</Btn>
            </a>
          </div>
        </div>
        {/* Footer */}
        <div style={{textAlign:"center"}}>
          <p style={{fontFamily:"var(--font-mono)",fontSize:"8px",color:"#C8B8A8",letterSpacing:"2.5px",marginBottom:"18px"}}>Méthode Anti K.O™ · {CFG.site.toUpperCase()}</p>
          <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
            {unlocked&&<Btn onClick={exportPDF}>↓ Exporter en PDF</Btn>}
            <Btn variant="secondary" onClick={reset}>Nouveau diagnostic</Btn>
          </div>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
